about: |
  hiiiiii i'm prethivv. i'm the kind of person who gets curious about
  something and then spends weeks obsessing over it. that's how i ended up
  bouncing between AI/ML, quantum computing, rust, C++, neural networks, and
  the occasional web-pentesting rabbit hole.

  i like building things from scratch just to understand why they work
  instead of only how they work. i genuinely love research, and i'm aspiring
  to build a career around it.

  i enjoy working on ideas that mix physics, math, and code. that includes
  things like quantum gates, wave-packet simulations, and the strange AI
  experiments i end up creating when a "what if i tried this" thought gets
  stuck in my head.

  outside all that, i'm trying to keep up with fitness up!, and occasionally
  gaming when my brain wants a break. i'm not the most outdoorsy person yet,
  but i'm working on it.

